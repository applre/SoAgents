name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: bun install

      - name: Download Bun sidecar binary
        run: |
          mkdir -p src-tauri/binaries
          curl -L -o /tmp/bun.zip \
            "https://github.com/oven-sh/bun/releases/download/bun-v1.3.6/bun-darwin-aarch64.zip"
          unzip -o /tmp/bun.zip -d /tmp/bun-extract
          cp /tmp/bun-extract/bun-darwin-aarch64/bun src-tauri/binaries/bun-aarch64-apple-darwin
          chmod +x src-tauri/binaries/bun-aarch64-apple-darwin
          rm -rf /tmp/bun.zip /tmp/bun-extract

      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k $KEYCHAIN_PATH

          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Write App Store Connect API key
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: echo -n "$APPLE_API_KEY_CONTENT" > /tmp/AuthKey.p8

      - name: Pre-sign Bun sidecar binary
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          BUN_BINARY="src-tauri/binaries/bun-aarch64-apple-darwin"
          ENTITLEMENTS="src-tauri/Entitlements.plist"

          echo "Removing quarantine attribute..."
          xattr -d com.apple.quarantine "$BUN_BINARY" 2>/dev/null || true

          echo "Pre-signing bun with app identity and JIT entitlements..."
          codesign --force --options runtime --timestamp \
            --entitlements "$ENTITLEMENTS" \
            --sign "$APPLE_SIGNING_IDENTITY" "$BUN_BINARY"

          echo "Verifying signature..."
          codesign -dvv "$BUN_BINARY"

      - name: Pre-build checks
        run: |
          # 版本号同步检查（package.json / Cargo.toml / tauri.conf.json）
          PKG_VER=$(node -p "require('./package.json').version")
          CARGO_VER=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          TAURI_VER=$(node -p "require('./src-tauri/tauri.conf.json').version")
          if [ "$PKG_VER" != "$CARGO_VER" ] || [ "$PKG_VER" != "$TAURI_VER" ]; then
            echo "❌ Version mismatch: package.json=$PKG_VER Cargo.toml=$CARGO_VER tauri.conf.json=$TAURI_VER"
            exit 1
          fi
          echo "✅ Version sync: $PKG_VER"

          # TypeScript 类型检查
          npm run typecheck
          echo "✅ TypeScript typecheck passed"

          # Bun sidecar 完整性校验
          BUN_BIN="src-tauri/binaries/bun-aarch64-apple-darwin"
          if [ ! -f "$BUN_BIN" ]; then
            echo "❌ Bun binary not found: $BUN_BIN"
            exit 1
          fi
          codesign -dvv "$BUN_BIN" 2>&1 || { echo "❌ Bun binary not signed"; exit 1; }
          echo "✅ Bun sidecar integrity OK"

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Build Tauri app
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: /tmp/AuthKey.p8
          TAURI_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri:build

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.tar.gz
            src-tauri/target/release/bundle/macos/*.sig
          draft: true
          generate_release_notes: true

      - name: Generate Tauri update manifest and upload to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUNDLE_DIR="src-tauri/target/release/bundle"
          APP_TAR="${BUNDLE_DIR}/macos/SoAgents.app.tar.gz"
          APP_SIG="${BUNDLE_DIR}/macos/SoAgents.app.tar.gz.sig"
          BUCKET="soagents-releases"
          BASE_URL="https://download.soagents.ai"
          TARGET="aarch64"
          TAURI_TARGET="darwin-aarch64"

          SIGNATURE=$(cat "$APP_SIG")
          RELEASE_FILENAME="SoAgents_${VERSION}_${TARGET}.app.tar.gz"
          RELEASE_URL="${BASE_URL}/releases/v${VERSION}/${RELEASE_FILENAME}"

          # Generate update manifest
          cat > /tmp/update-manifest.json <<MANIFEST
          {
            "version": "${VERSION}",
            "notes": "SoAgents v${VERSION}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "${TAURI_TARGET}": {
                "url": "${RELEASE_URL}",
                "signature": "${SIGNATURE}"
              }
            }
          }
          MANIFEST

          echo "Update manifest:"
          cat /tmp/update-manifest.json

          # Upload tar.gz to R2
          echo "Uploading build artifact to R2..."
          aws s3 cp "$APP_TAR" \
            "s3://${BUCKET}/releases/v${VERSION}/${RELEASE_FILENAME}" \
            --endpoint-url "$R2_ENDPOINT"

          # Upload update manifest to R2
          echo "Uploading update manifest to R2..."
          aws s3 cp /tmp/update-manifest.json \
            "s3://${BUCKET}/update/${TAURI_TARGET}.json" \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type "application/json"

          echo "Done!"
          echo "Release: ${RELEASE_URL}"
          echo "Manifest: ${BASE_URL}/update/${TAURI_TARGET}.json"
